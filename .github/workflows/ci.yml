name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests & Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '06-lab-complete/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 06-lab-complete/requirements.txt

      - name: Run Pytest
        env:
          PYTHONPATH: 06-lab-complete
        run: |
          pytest 06-lab-complete/tests

      - name: Verify Production Readiness
        run: |
          python 06-lab-complete/check_production_ready.py
